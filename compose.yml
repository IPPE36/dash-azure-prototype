services:
  web:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/web.txt
    image: dash-azure-prototype-web
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./backups:/app/db_backups
      - ./dev_users.json:/app/dev_users.json:ro
    ports:
      - "${PORT:-8050}:8050"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker-default:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/worker.txt
    entrypoint: []
    command: ["celery", "-A", "shared.celery_app:celery_app", "worker", "--loglevel=INFO", "-Q", "default", "--concurrency=1", "-n", "default@%h"]
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./backups:/app/db_backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker-long:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/worker.txt
    entrypoint: []
    command: ["celery", "-A", "shared.celery_app:celery_app", "worker", "--loglevel=INFO", "-Q", "background", "--concurrency=1", "-n", "long@%h"]
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./backups:/app/db_backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  desktop-24h-backup:
    image: postgres:16-alpine
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-180}
    mem_limit: 128m
    cpus: "0.1"
    volumes:
      - ./backups:/backups
      - ./backups/scripts/backup-loop.sh:/usr/local/bin/backup-loop.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/usr/local/bin/backup-loop.sh"]
    restart: unless-stopped

  desktop-pytest:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/test.txt
    entrypoint: []
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      - TEST_START_DELAY=${TEST_START_DELAY:-5}
      - DATABASE_URL=${DATABASE_URL}
      - RUN_CELERY_TESTS=${RUN_CELERY_TESTS:-true}
      - RUN_REDIS_TESTS=${RUN_REDIS_TESTS:-true}
      - RUN_POSTGRE_TESTS=${RUN_POSTGRE_TESTS:-true}
      - RUN_ALEMBIC_TESTS=${RUN_ALEMBIC_TESTS:-true}
    volumes:
      - ./backups:/app/db_backups
      - ./dev_users.json:/app/dev_users.json:ro
      - ./tests:/app/tests
    command: ["sh", "-c", "sleep ${TEST_START_DELAY:-5} && pytest -q"]
      

volumes:
  postgres_data:
  redis_data:

services:
  web:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/web.txt
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./db_backups:/app/db_backups
      - ./dev_users.json:/app/dev_users.json:ro
    ports:
      - "${PORT:-8050}:8050"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker-default:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/worker.txt
    command: ["celery", "-A", "shared.celery_app:celery_app", "worker", "--loglevel=INFO", "-Q", "default", "--concurrency=1", "-n", "default@%h"]
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./db_backups:/app/db_backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker-long:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/worker.txt
    command: ["celery", "-A", "shared.celery_app:celery_app", "worker", "--loglevel=INFO", "-Q", "background", "--concurrency=1", "-n", "long@%h"]
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./db_backups:/app/db_backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  24hbackup:
    image: postgres:16-alpine
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./db_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "while true; do ts=$$(date +%Y%m%d); pg_dump --format=custom --no-owner --no-privileges -h postgres -U $${POSTGRES_USER:-postgres} $${POSTGRES_DB:-appdb} > /backups/postgres_$${ts}.dump; sleep $${BACKUP_INTERVAL_SECONDS:-86400}; done"
      ]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

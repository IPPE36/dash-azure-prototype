<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dev Sign in</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/css/00_base.css">
  <link rel="stylesheet" href="/assets/css/04_dbc_button.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bs-primary);
    }
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .auth-card {
      width: min(520px, 100%);
      background: var(--bs-body-bg);
      border: 1px solid var(--bs-border-color);
      border-radius: var(--bs-border-radius);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.15);
      padding: 32px;
    }
    .auth-title {
      margin: 0 0 12px;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .auth-subtitle {
      margin: 0 0 24px;
      color: var(--bs-secondary-color);
    }
    .auth-error {
      color: var(--bs-danger);
      margin: 0 0 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      height: 44px;
      border-radius: var(--bs-border-radius-sm);
      border: 1px solid rgba(15, 23, 42, 0.18);
      padding: 0 12px;
      font-size: 1rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background: #fff;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--bs-primary);
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1 class="auth-title">Developer Login</h1>
      <p class="auth-subtitle">Use a local developer account to continue...</p>
      {% if error %}
        <p class="auth-error">{{ error }}</p>
      {% endif %}
      <form method="post">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </section>
  </main>
</body>
</html>

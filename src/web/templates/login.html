<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/00_base.css">
  <link rel="stylesheet" href="/assets/04_dbc_button.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--bs-body-color);
      background: linear-gradient(135deg, var(--bs-body-bg), var(--bs-tertiary-bg));
    }
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .auth-card {
      width: min(520px, 100%);
      background: var(--bs-body-bg);
      border: 1px solid var(--bs-border-color);
      border-radius: var(--bs-border-radius);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.15);
      padding: 32px;
    }
    .auth-title {
      margin: 0 0 12px;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .auth-subtitle {
      margin: 0 0 24px;
      color: var(--bs-secondary-color);
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1 class="auth-title">Sign in</h1>
      <p class="auth-subtitle">Continue with your Microsoft account.</p>
      <a class="btn btn-primary w-100" href="{{ auth_uri }}">Continue with Microsoft</a>
    </section>
  </main>
</body>
</html>

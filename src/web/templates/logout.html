<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signed out</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/css/00_base.css">
  <link rel="stylesheet" href="/assets/css/04_dbc_button.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--bs-body-color);
      background: var(--bs-primary);
    }
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      width: min(520px, 100%);
      background: var(--bs-body-bg);
      border: 1px solid var(--bs-border-color);
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.15);
    }
    .auth-title {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .auth-subtitle {
      color: var(--bs-secondary-color);
    }
  </style>
</head>
<body class="m-0">
  <main class="auth-page py-5 px-3">
    <section class="auth-card p-4">
      <h1 class="auth-title mb-2">Signed out</h1>
      <p class="auth-subtitle mb-4">You have been logged out successfully.</p>
      <a class="btn btn-primary w-100" href="/login">Sign in again</a>
    </section>
  </main>
</body>
</html>
